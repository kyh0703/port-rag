services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: port
      POSTGRES_PASSWORD: port
      POSTGRES_DB: port
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U port -d port"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  rag:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env.example
      - path: .env
        required: false
    ports:
      - "8000:8000"

volumes:
  pgdata:
