# main 머지 시 이미지를 한 번 빌드한다. 이게 유일한 build 지점(build once, promote many).
#
# 결과 태그:
#   ghcr.io/kyh0703/port-rag:sha-<commit>  (immutable, staging/prod 승격의 원본)
#   ghcr.io/kyh0703/port-rag:dev           (mutable, dev 가 항상 보는 태그)
#
# dev 배포는 port-helm 의 gitops/envs/dev/rag.yaml revision 을 갱신해 트리거한다.
name: build-dev

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: kyh0703/port-helm
  SERVICE: rag

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
            ${{ steps.img.outputs.name }}:dev
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: _gitops

      - name: install yq
        run: |
          tmp=$(mktemp)
          trap 'rm -f "$tmp"' EXIT
          curl --fail --show-error --location --output "$tmp" \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          echo "fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4  $tmp" \
            | sha256sum --check --status -
          sudo install -m 0755 "$tmp" /usr/local/bin/yq

      - name: bump dev revision & push
        working-directory: _gitops
        env:
          REV: sha-${{ github.sha }}
        run: |
          FILE="gitops/envs/dev/${SERVICE}.yaml"
          yq -i '.podAnnotations.revision = strenv(REV)' "$FILE"

          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

          if git diff --quiet -- "$FILE"; then
            echo "revision unchanged — skip"
            exit 0
          fi
          git commit -am "dev: bump ${SERVICE} revision → ${REV}"
          git push origin main
