# 릴리즈/승격. 재빌드 없이 main 에서 만든 sha 이미지를 재태그하고,
# port-helm 환경 태그를 갱신하는 PR 을 생성한다.
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: kyh0703/port-helm
  SERVICE: rag

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - id: v
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-rc.* ]]; then
            echo "env=staging" >> "$GITHUB_OUTPUT"
          else
            echo "env=prod" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: retag sha image
        run: |
          docker buildx imagetools create \
            -t ${{ steps.img.outputs.name }}:${{ steps.v.outputs.version }} \
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: _gitops

      - name: install yq
        run: |
          tmp=$(mktemp)
          trap 'rm -f "$tmp"' EXIT
          curl --fail --show-error --location --output "$tmp" \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          echo "fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4  $tmp" \
            | sha256sum --check --status -
          sudo install -m 0755 "$tmp" /usr/local/bin/yq

      - name: bump tag & open PR
        working-directory: _gitops
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
          ENVIRON: ${{ steps.v.outputs.env }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          FILE="gitops/envs/${ENVIRON}/${SERVICE}.yaml"
          yq -i '.image.tag = strenv(VERSION)' "$FILE"

          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          BR="promote/${SERVICE}-${ENVIRON}-${VERSION}"
          git checkout -b "$BR"
          git commit -am "promote ${SERVICE} ${VERSION} → ${ENVIRON}"
          git push -f origin "$BR"

          gh pr create --repo "${GITOPS_REPO}" --base main --head "$BR" \
            --title "promote ${SERVICE} ${VERSION} → ${ENVIRON}" \
            --body "port-rag ${GITHUB_REF_NAME} 릴리즈에서 자동 생성. 머지하면 ArgoCD 가 ${ENVIRON} 에 반영."
